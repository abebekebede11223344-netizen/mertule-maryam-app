<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mertule Maryam App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash-screen">
        <div class="splash-frame">
            <p>እንኳን ወደ መርጡለ ማሪያም School app በደህና መጣችሁ</p>
            <h1>በበረከት ቀናው የተዘጋጀ</h1>
        </div>
    </div>

    <div id="registration-page" class="hidden">
        <div class="container">
            <h2>የምዝገባ ፎርም</h2>
            <input type="text" id="fname" placeholder="ስም" style="width:94%; padding:12px; margin-bottom:10px;">
            <select id="role" onchange="toggleCodeInput()" style="width:100%; padding:12px;">
                <option value="student">ተማሪ</option>
                <option value="teacher">መምህር</option>
                <option value="admin">አስተዳዳሪ</option>
            </select>
            <div id="code-section" class="hidden">
                <input type="password" id="access-code" placeholder="ኮድ ያስገቡ" style="width:94%; padding:12px; margin-top:10px;">
            </div>
            <button onclick="handleRegister()">ይግቡ</button>
        </div>
    </div>

    <div id="main-dashboard" class="hidden">
        <div class="container">
            <h3 id="welcome-msg"></h3>
            <div id="admin-tools" class="hidden">
                <button onclick="document.getElementById('file-input').click()">📸 ፋይል/ፎቶ ምረጥ</button>
                <input type="file" id="file-input" class="hidden" accept="image/*,video/*,.pdf">
            </div>
            <div id="grade-list">
                <button onclick="selectGrade(9)">9ኛ ክፍል</button>
                <button onclick="selectGrade(10)">10ኛ ክፍል</button>
                <button onclick="selectGrade(11)">11ኛ ክፍል</button>
                <button onclick="selectGrade(12)">12ኛ ክፍል</button>
            </div>
            <button class="logout-btn" onclick="logOut()">Log Out (ውጣ)</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=2');
        }
    </script>
</body>
</html>
