<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>መርጡ ለማርያም ትምህርት ቤት</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash-screen">
        <h1 class="fade-in">በበረከት ቀናው የተዘጋጀ</h1>
    </div>

    <div id="registration-page" class="hidden">
        <div class="container">
            <h2>የምዝገባ ፎርም</h2>
            <input type="text" id="fname" placeholder="ስም">
            <input type="text" id="lname" placeholder="የአባት ስም">
            <input type="tel" id="phone" placeholder="ስልክ (09... ብቻ)">
            <input type="number" id="age" placeholder="እድሜ">
            <select id="role" onchange="toggleCodeInput()">
                <option value="student">ተማሪ</option>
                <option value="teacher">መምህር</option>
                <option value="admin">አስተዳደር</option>
            </select>
            <div id="code-section" class="hidden">
                <input type="password" id="access-code" placeholder="የመለያ ኮድ ያስገቡ">
            </div>
            <button onclick="handleRegister()">ይግቡ</button>
        </div>
    </div>

    <div id="main-dashboard" class="hidden">
        <div class="header">
            <input type="text" id="search" placeholder="ፈልግ...">
            <button id="back-btn">ተመለስ</button>
        </div>
        <div id="grade-selection">
            <h3>ክፍልዎን ይምረጡ</h3>
            <button onclick="showGrade(9)">9ኛ ክፍል</button>
            <button onclick="showGrade(10)">10ኛ ክፍል</button>
            <button onclick="showGrade(11)">11ኛ ክፍል</button>
            <button onclick="showGrade(12)">12ኛ ክፍል</button>
        </div>
        <div id="content-display" class="hidden"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
