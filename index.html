<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mertule Maryam School App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash-screen">
        <div class="splash-frame">
            <p style="font-size: 1.2rem;">እንኳን ወደ መርጡለ ማሪያም School app በደህና መጣችሁ</p>
            <h1 style="font-size: 2.2rem;">በበረከት ቀናው የተዘጋጀ</h1>
        </div>
    </div>

    <div id="registration-page" class="hidden">
        <div class="container">
            <h2 style="text-align:center; color:#1e3a8a;">የምዝገባ ፎርም</h2>
            <input type="text" id="fname" placeholder="ሙሉ ስም">
            <select id="role" onchange="toggleCodeInput()">
                <option value="student">ተማሪ</option>
                <option value="teacher">መምህር</option>
                <option value="admin">አስተዳዳሪ</option>
            </select>
            <div id="code-section" class="hidden">
                <input type="password" id="access-code" placeholder="የመለያ ኮድ ያስገቡ">
            </div>
            <button onclick="handleRegister()">ይግቡ</button>
        </div>
    </div>

    <div id="main-dashboard" class="hidden">
        <div class="container">
            <h3 id="welcome-msg"></h3>
            
            <div id="admin-tools" class="hidden" style="background:#fff; padding:15px; border-radius:12px; margin-bottom:15px;">
                <h4 style="margin-top:0;">የፋይል መጫኛ (Admin/Teacher)</h4>
                <button onclick="document.getElementById('file-input').click()" style="background:#059669;">📸 ፎቶ/ፋይል ይምረጡ</button>
                <input type="file" id="file-input" class="hidden" accept="image/*,video/*,.pdf">
            </div>

            <div id="grade-selection">
                <h4>ክፍል ይምረጡ</h4>
                <div class="subject-grid">
                    <button onclick="showSubjects(9)">9ኛ ክፍል</button>
                    <button onclick="showSubjects(10)">10ኛ ክፍል</button>
                    <button onclick="showSubjects(11)">11ኛ ክፍል</button>
                    <button onclick="showSubjects(12)">12ኛ ክፍል</button>
                </div>
            </div>

            <div id="subject-section" class="hidden">
                <button onclick="backToGrades()" style="background:#6b7280;">ወደ ኋላ</button>
                <h4 id="grade-title"></h4>
                <div id="stream-selection" class="hidden">
                    <button onclick="setStream('Natural')">Natural Stream</button>
                    <button onclick="setStream('Social')">Social Stream</button>
                </div>
                <div id="subject-list" class="subject-grid"></div>
            </div>

            <button class="logout-btn" onclick="logOut()">Log Out (ውጣ)</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
