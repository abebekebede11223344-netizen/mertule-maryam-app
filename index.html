<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mertule Maryam School App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash-screen">
        <div class="splash-text">
            <h2>እንኳን ወደ መርጡለ ማሪያም School app በደህና መጣቹህ</h2>
            <h1 style="background: white; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-image: linear-gradient(45deg, #ff00cc, #3333ff);">በ በረከት ቀናው የተዘጋጀ</h1>
        </div>
    </div>

    <div id="registration-page" class="hidden">
        <div class="container">
            <h3>የምዝገባ ፎርም</h3>
            <input type="text" id="fname" placeholder="ስም">
            <input type="text" id="lname" placeholder="የአባት ስም">
            <input type="tel" id="phone" placeholder="የቴሌ ስልክ ብቻ (09/07...)">
            <input type="number" id="age" placeholder="እድሜ">
            <select id="gender"><option value="ወንድ">ወንድ</option><option value="ሴት">ሴት</option></select>
            <select id="role" onchange="toggleCode()">
                <option value="student">ተማሪ</option>
                <option value="teacher">መምህር</option>
                <option value="admin">ርዕሰ መምህር /አስተዳደር</option>
            </select>
            <input type="password" id="code" class="hidden" placeholder="ኮድ ያስገቡ">
            <button onclick="handleLogin()">ይግቡ</button>
        </div>
    </div>

    <div id="main-dashboard" class="hidden">
        <div class="container">
            <div id="announcement-area" style="background:#fef3c7; padding:10px; border-radius:10px; margin-bottom:10px;" class="hidden"></div>
            
            <div id="admin-tools" class="hidden">
                <textarea id="notice-msg" placeholder="ለሁሉም የሚተላለፍ ማስታወቂያ..." style="width:100%; border-radius:10px; padding:10px;"></textarea>
                <button onclick="sendNotice()" style="background:#059669;">ማስታወቂያ አስተላልፍ 📢</button>
                <button onclick="document.getElementById('file-up').click()">📸 ፋይል/ፎቶ/ቪዲዮ ይጫኑ</button>
                <input type="file" id="file-up" class="hidden" accept="image/*,video/*,.pdf" multiple>
            </div>

            <div id="grade-view">
                <h3 style="color:#1e3a8a;">የክፍል ደረጃዎች</h3>
                <button class="grade-btn" onclick="showSubjects(9)">9ኛ ክፍል (2018)</button>
                <button class="grade-btn" onclick="showSubjects(10)">10ኛ ክፍል (2018)</button>
                <button class="grade-btn" onclick="showSubjects(11)">11ኛ ክፍል (Social/Natural)</button>
                <button class="grade-btn" onclick="showSubjects(12)">12ኛ ክፍል (Social/Natural)</button>
            </div>

            <div id="content-view" class="hidden">
                <button class="back-btn" onclick="goBack()">⬅ ተመለስ</button>
                <h4 id="title-text"></h4>
                <div id="list-area"></div>
            </div>
            
            <button onclick="logOut()" style="background:red; margin-top:20px;">Log Out (ውጣ)</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
